services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: {{KAOS_PROJECT_SLUG}}-backend:latest
    env_file: .env
    expose:
      - "8000"
    volumes:
      - ./.kaos-vfs:/app/.kaos-vfs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/v1/health',timeout=4).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2-alpine
    ports:
      - "127.0.0.1:8080:80"
      - "127.0.0.1:8443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./apps/spa/dist:/srv:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
