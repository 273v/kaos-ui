name: Bug report
description: Report a defect in kaos-ui
title: "[bug] "
labels: ["type:bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the sections below.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug. Include any error messages or stack traces.
      placeholder: When I run `kaos-ui new web:spa myapp`, X happens instead of Y.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce
      description: Minimal commands or code that reproduce the bug.
      render: shell
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: kaos-ui version
      description: Output of `python -c "import kaos_ui; print(kaos_ui.__version__)"`
      placeholder: e.g. 0.1.0a1
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      description: Output of `python --version`
      placeholder: e.g. 3.13.1
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. Ubuntu 24.04, macOS 15.4
    validations:
      required: true

  - type: dropdown
    id: template
    attributes:
      label: Affected template kind (if applicable)
      options:
        - "(not template-related)"
        - "web:api"
        - "web:spa"
        - "dashboard:streamlit"
        - "tui:textual"
        - "module"
        - "workflow"

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else that might help.
