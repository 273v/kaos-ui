name: Feature request
description: Suggest a new capability or improvement for kaos-ui
title: "[feat] "
labels: ["type:feat", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case, not the implementation.
      placeholder: I'm trying to scaffold X and the current templates force me to Y.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Optional. If you already have an API, CLI shape, or template layout in mind, sketch it here.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds did you try, and why aren't they enough?
