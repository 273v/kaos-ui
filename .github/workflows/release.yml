name: Release

on:
  push:
    tags:
      - "v*"
      - "kaos-ui-react@*"
  workflow_dispatch:
    inputs:
      publish_npm:
        description: "Run publish-kaos-ui-react against the current ref (no tag required)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --group dev --python 3.13

      - name: Verify version matches tag
        id: version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=$(uv run python -c "from kaos_ui._version import __version__; print(__version__)")
          TAG=${GITHUB_REF_NAME#v}
          if [ "$VERSION" != "$TAG" ]; then
            echo "::error::Tag '$TAG' does not match _version.py value '$VERSION'"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Pre-publish QA
        run: |
          uv run ruff format --check kaos_ui tests
          uv run ruff check kaos_ui tests
          uv run ty check kaos_ui tests
          uv run pytest -m "not slow" --no-cov

      - name: Build wheel + sdist
        run: uv build

      - name: Verify metadata
        run: uvx --from twine twine check --strict dist/*

      - name: Smoke-test the built wheel in a clean venv
        run: |
          uv venv --python 3.13 /tmp/smoke
          uv pip install --python /tmp/smoke/bin/python dist/kaos_ui-*-py3-none-any.whl
          /tmp/smoke/bin/python -c "
          import kaos_ui
          from kaos_core import KaosRuntime
          from kaos_ui import TEMPLATES, register_ui_tools, scaffold
          rt = KaosRuntime()
          count = register_ui_tools(rt)
          assert isinstance(count, int) and count == 4
          tools = sorted(rt.tools.list_tools())
          assert len(tools) == 4 and len(TEMPLATES) >= 6
          print(f'kaos-ui {kaos_ui.__version__}: {len(TEMPLATES)} templates, {count} MCP tools')
          "

      - name: Generate CycloneDX SBOM
        run: |
          set -euo pipefail
          mkdir -p sbom
          SDIST=$(ls dist/*.tar.gz | head -1)
          PKG_VERSION=$(basename "$SDIST" .tar.gz | awk -F- '{print $NF}')
          PKG_NAME="kaos-ui"
          SBOM_FILE="sbom/${PKG_NAME}-${PKG_VERSION}.cdx.json"
          uvx --from cyclonedx-bom==7.3.0 cyclonedx-py environment .venv \
            --pyproject pyproject.toml \
            --mc-type library \
            --of JSON \
            --output-reproducible \
            --validate \
            -o "${SBOM_FILE}"
          uv run python -c "
          import json, sys
          d = json.load(open('${SBOM_FILE}'))
          n = len(d.get('components', []))
          if n == 0:
              print('ERROR: SBOM has 0 components', file=sys.stderr)
              sys.exit(1)
          print(f'SBOM OK: {n} components, file=${SBOM_FILE}')
          "

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom
          path: sbom/
          retention-days: 30

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/
          retention-days: 30

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/kaos-ui
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          attestations: true
          skip-existing: false

  github-release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Download SBOM artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sbom
          path: sbom/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          PRERELEASE_FLAG=""
          if [[ "$VERSION" == *a* || "$VERSION" == *b* || "$VERSION" == *rc* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "kaos-ui $VERSION" \
            --notes-from-tag \
            $PRERELEASE_FLAG \
            dist/* \
            sbom/*

  publish-kaos-ui-react:
    name: Publish @273v/kaos-ui-react to npm
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/kaos-ui-react@') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_npm == true)
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pnpm (version from package.json packageManager)
        uses: pnpm/action-setup@v6

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Build kaos-ui-react
        run: pnpm --filter @273v/kaos-ui-react run build

      - name: Verify package.json version matches tag (when triggered by tag)
        if: startsWith(github.ref, 'refs/tags/kaos-ui-react@')
        run: |
          PKG_VER=$(node -p "require('./packages/kaos-ui-react/package.json').version")
          TAG_VER=${GITHUB_REF_NAME#kaos-ui-react@}
          if [ "$PKG_VER" != "$TAG_VER" ]; then
            echo "::error::Tag '$TAG_VER' does not match package.json '$PKG_VER'"
            exit 1
          fi

      - name: Publish to npm (token auth or Trusted Publishing OIDC, + provenance)
        working-directory: packages/kaos-ui-react
        # NODE_AUTH_TOKEN is consumed by the .npmrc that setup-node wrote.
        # When the NPM_TOKEN secret is set, npm authenticates with it; when
        # it is absent, publish relies on npm Trusted Publishing OIDC, which
        # MUST be configured on npmjs.org for this package + repo + workflow.
        # Either way provenance is attached (id-token: write is granted).
        # See docs/RELEASING.md for the one-time setup of EITHER path.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          PKG_VER=$(node -p "require('./package.json').version")
          # Choose dist-tag from version: alpha/beta/rc → prerelease channel; else latest.
          case "$PKG_VER" in
            *alpha*) DIST_TAG=alpha ;;
            *beta*)  DIST_TAG=beta  ;;
            *rc*)    DIST_TAG=rc    ;;
            *)       DIST_TAG=latest ;;
          esac
          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            echo "Auth: NPM_TOKEN (automation token)"
          else
            echo "Auth: npm Trusted Publishing OIDC (no NPM_TOKEN secret present)"
            echo "::warning::No NPM_TOKEN secret — relying on OIDC Trusted Publishing, which must be configured on npmjs.org. If publish 404s, see docs/RELEASING.md."
          fi
          echo "Publishing $PKG_VER on dist-tag $DIST_TAG"
          npm publish --provenance --access public --tag "$DIST_TAG"

      - name: Verify the version is actually live on npm
        # npm can report a "successful" publish step while the registry PUT
        # silently 404s (this is exactly how 0.1.0-alpha.10 and alpha.11 were
        # lost — the job looked done but nothing landed). This step makes that
        # failure mode LOUD: a real, blocking red X with a pointer to the fix.
        working-directory: packages/kaos-ui-react
        run: |
          set -euo pipefail
          PKG_VER=$(node -p "require('./package.json').version")
          for attempt in 1 2 3 4 5; do
            if npm view "@273v/kaos-ui-react@${PKG_VER}" version >/dev/null 2>&1; then
              echo "✓ @273v/kaos-ui-react@${PKG_VER} is live on npm"
              exit 0
            fi
            echo "Not visible on npm yet (attempt ${attempt}/5)…"
            sleep 10
          done
          echo "::error::Publish reported success but @273v/kaos-ui-react@${PKG_VER} is NOT on npm. Almost always this means neither auth path worked (no NPM_TOKEN secret AND Trusted Publishing not configured on npmjs.org). Fix per docs/RELEASING.md, then re-run this workflow or publish manually."
          exit 1
