name: build

# Standard `build` lane (per
# kaos-modules/docs/oss/40-ci-cd/runner-cost-reduction-plan.md):
# build wheel/sdist, `twine check --strict`, clean-venv smoke install.
# Linux Python 3.13 on PR / main push / tag. The release workflow
# (release.yml) is the gated artifact-publish path; this lane is the
# PR-time smoke that the artifact builds cleanly and the wheel
# installs.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: build
    runs-on: kaos-x64-16core
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Build wheel and sdist
        run: uv build

      - name: Verify metadata
        run: uvx --from twine twine check --strict dist/*

      - name: Smoke-test the built wheel in a clean venv
        run: |
          uv venv --python 3.13 /tmp/smoke
          uv pip install --python /tmp/smoke/bin/python dist/kaos_ui-*-py3-none-any.whl
          /tmp/smoke/bin/python -c "
          import kaos_ui
          assert kaos_ui.__version__, 'version missing from wheel'
          from kaos_ui import (
              KaosUISettings,
              ScaffoldResult,
              TEMPLATES,
              register_ui_tools,
              scaffold,
          )
          from kaos_core import KaosRuntime
          rt = KaosRuntime()
          # kaos-mcp loader contract: register_ui_tools returns int count.
          count = register_ui_tools(rt)
          assert isinstance(count, int) and count == 4, f'bad return: {count!r}'
          tools = sorted(rt.tools.list_tools())
          assert len(tools) == 4, f'expected 4 tools, got {len(tools)}: {tools}'
          assert len(TEMPLATES) >= 6, f'expected >=6 templates, got {len(TEMPLATES)}'
          print(f'kaos-ui {kaos_ui.__version__}: {len(TEMPLATES)} templates, {count} MCP tools')
          "
          /tmp/smoke/bin/kaos-ui --help

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
