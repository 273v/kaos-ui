# Pre-commit hooks for the single-user-chat example.
#
# The kaos-ui web:spa template does NOT ship one of these (verified
# pre-flight, docs/PATTERNS.md). We generate one ourselves so the
# example's `make install` → `uv run pre-commit install` works.
#
# Hooks are scoped to this example directory only; the kaos-modules
# repo-wide pre-commit is configured separately.

repos:
  # Hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: detect-private-key

  # Python — ruff (format + lint) + ty (typecheck)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff-format
        files: ^backend/
      - id: ruff
        args: ["--fix"]
        files: ^backend/

  # JS/TS — biome (formatting + linting both)
  - repo: https://github.com/biomejs/pre-commit
    rev: v2.0.0
    hooks:
      - id: biome-check
        files: ^apps/spa/
